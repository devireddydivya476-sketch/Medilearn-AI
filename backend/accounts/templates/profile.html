<!doctype html>
<html>
  <head>
    <title>MediLearn AI Dashboard</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <div class="dashboard">
      <h1>Welcome to MediLearn AI</h1>

      <h2>Hello, {{ user.username }} 👋</h2>

      <div class="cards">
        <div class="card">
          <h3>📚 Courses</h3>
          <p>Explore medical learning materials.</p>
        </div>

        <div class="card">
          <h3>🤖 AI Assistant</h3>
          <p>Ask questions and learn with AI.</p>
        </div>

        <div class="card">
          <h3>📊 Progress</h3>
          <p>Track your learning progress.</p>
        </div>
      </div>

      <br />

      <a href="{% url 'logout' %}"> Logout </a>
    </div>
  </body>
</html>
