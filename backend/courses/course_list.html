<!doctype html>
<html>
  <head>
    <title>Courses</title>
  </head>
  <body>
    <h1>Available Courses</h1>

    {% for course in courses %}
    <div style="border: 1px solid #ccc; padding: 15px; margin: 15px">
      <h2>{{ course.title }}</h2>
      <p>{{ course.description }}</p>
    </div>
    {% empty %}
    <p>No courses available.</p>
    {% endfor %}
  </body>
</html>
